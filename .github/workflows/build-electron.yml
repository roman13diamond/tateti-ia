name: Build Electron Windows executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable Corepack and prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron .exe
        run: pnpm --filter @workspace/electron-app run build

      - name: Copy output to repo root
        run: |
          mkdir -p "${{ github.workspace }}\win-unpacked"
          cp -R "${{ github.workspace }}\artifacts\electron-app\dist-exe\win-unpacked\*" "${{ github.workspace }}\win-unpacked\"
          cp "${{ github.workspace }}\artifacts\electron-app\dist-exe\TaTeTi-IA-Portable.exe" "${{ github.workspace }}\TaTeTi-IA-Portable.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TaTeTi-IA-windows
          path: |
            artifacts/electron-app/dist-exe/**
            artifacts/electron-app/dist-exe/win-unpacked/**
            win-unpacked/**
            TaTeTi-IA-Portable.exe
