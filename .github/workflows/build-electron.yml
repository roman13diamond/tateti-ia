name: Build Electron Windows executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable Corepack and prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron .exe
        run: pnpm --filter @workspace/electron-app run build

      - name: Copy output to repo root
        run: |
          New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE\win-unpacked" -Force | Out-Null
          Copy-Item -Path "$env:GITHUB_WORKSPACE\artifacts\electron-app\dist-exe\win-unpacked\*" -Destination "$env:GITHUB_WORKSPACE\win-unpacked" -Recurse -Force
          Copy-Item -Path "$env:GITHUB_WORKSPACE\artifacts\electron-app\dist-exe\TaTeTi-IA-Portable.exe" -Destination "$env:GITHUB_WORKSPACE\TaTeTi-IA-Portable.exe" -Force
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\TaTeTi-IA-Portable.exe","$env:GITHUB_WORKSPACE\win-unpacked\*" -DestinationPath "$env:GITHUB_WORKSPACE\TaTeTi-IA-windows.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TaTeTi-IA-windows
          path: |
            artifacts/electron-app/dist-exe/**
            artifacts/electron-app/dist-exe/win-unpacked/**
            win-unpacked/**
            TaTeTi-IA-Portable.exe
            TaTeTi-IA-windows.zip
