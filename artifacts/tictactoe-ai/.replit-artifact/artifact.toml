kind = "web"
previewPath = "/"
title = "Ta-Te-Ti IA Q-Learning"
version = "1.0.0"
id = "artifacts/tictactoe-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21019

[services.development]
run = "pnpm --filter @workspace/tictactoe-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tictactoe-ai", "run", "build" ]
publicDir = "artifacts/tictactoe-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21019"
BASE_PATH = "/"
